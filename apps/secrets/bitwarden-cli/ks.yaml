---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bitwarden-cli
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/secrets/bitwarden-cli/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
