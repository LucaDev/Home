---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: plugin-barman-cloud
  namespace: flux-system
spec:
  interval: 1h
  ref:
    tag: v0.13.0
  url: https://github.com/cloudnative-pg/plugin-barman-cloud
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plugin-barman-cloud
  namespace: flux-system
spec:
  interval: 1h
  path: "./config/default"
  prune: true
  sourceRef:
    kind: GitRepository
    name: plugin-barman-cloud
    namespace: flux-system
  wait: true
  dependsOn:
    - name: cert-manager
