---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Trivy Overview auf Steroiden
    gethomepage.dev/group: Sicherheit
    gethomepage.dev/name: KubeExposure
  name: kubeexposure
spec:
  hostnames:
    - kubeexposure.lucadev.de
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: kube-exposure
          namespace: security
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
