---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-exposure
  namespace: security
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kube-exposure
    namespace: security
  values:
    replicaCount: 1
    postgres:
      enabled: false
    existingSecret: kubeexposure-secret
