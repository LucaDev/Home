---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate-webhook-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: konflate-webhook-token-secret
    template:
      data:
        KONFLATE_WEBHOOK_SECRET: "{{ .KONFLATE_WEBHOOK_SECRET }}"
        KONFLATE_APP_CLIENT_ID: "{{ .GITHUB_BOT_APP_CLIENT_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .GITHUB_BOT_APP_PRIVATE_KEY }}"
  data:
    - secretKey: KONFLATE_WEBHOOK_SECRET
      remoteRef:
        key: github.com
        property: KONFLATE_HOME_WEBHOOK_SECRET
    - secretKey: GITHUB_BOT_APP_CLIENT_ID
      remoteRef:
        key: github.com
        property: LUCADEVBOT_CLIENTID
    - secretKey: GITHUB_BOT_APP_PRIVATE_KEY
      remoteRef:
        key: github.com
        property: LUCADEVBOT_PRIVATEKEY
        decodingStrategy: Base64
