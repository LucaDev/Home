---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname kiwix
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/media/kiwix/app"
  prune: false # TODO
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false # no flux ks dependents
  postBuild:
    substitute:
      APP: *appname
