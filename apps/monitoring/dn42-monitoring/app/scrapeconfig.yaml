---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: vyos-router-metrics
spec:
  staticConfigs:
    - targets:
        - "192.168.1.83:54321"
      labels:
        instance: vyos-router
        job: vyos-node-exporter
    - targets:
        - "192.168.1.83:54322"
      labels:
        instance: vyos-router
        job: vyos-frr-exporter
    - targets:
        - "192.168.1.83:54323"
      labels:
        instance: vyos-router
        job: vyos-blackbox-exporter
