---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname mqtt-exporter
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/monitoring/mqtt-exporter/app"
  prune: false # TODO
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false # no flux ks dependents
  postBuild:
    substitute:
      APP: *appname
      APP_UID: "568"
      APP_GID: "568"
  dependsOn:
    - name: external-secrets-stores
