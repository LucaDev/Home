---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname openspeedtest
  namespace: flux-system
spec:
  interval: 1h
  path: "./apps/networking/openspeedtest/app"
  prune: false # TODO
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false # no flux ks dependents
  dependsOn:
    - name: envoy-gateway
  postBuild:
    substitute:
      APP: *appname
