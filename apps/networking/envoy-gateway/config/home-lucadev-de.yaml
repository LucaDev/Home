---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-lucadev-de-wildcard
spec:
  secretName: home-lucadev-de-wildcard-cert
  dnsNames:
    - "*.home.lucadev.de"
    - "*.iot.lucadev.de"
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
